<div class="modal-header">
    <div class="header-title-group">
        <h2 mat-dialog-title>{{ data.title || ui.t('pdf.previewTitle') }}</h2>

        <button mat-icon-button type="button" (click)="openInNewTab()" [matTooltip]="ui.t('pdf.openNewTab')"
            [attr.aria-label]="ui.t('pdf.openNewTabAria')">
            <mat-icon>open_in_new</mat-icon>
        </button>
    </div>

    <button mat-icon-button (click)="close()" [attr.aria-label]="ui.t('pdf.closeDialogAria')">
        <mat-icon>close</mat-icon>
    </button>
</div>
<mat-dialog-content class="pdf-viewer-content">
    @if (pdfUrl) {
    <embed [src]="pdfUrl" type="application/pdf" width="100%" height="100%" />
    } @else {
    <div class="error-container">
        <mat-icon color="warn">error_outline</mat-icon>
        <p>{{ ui.t('pdf.invalid') }}</p>
    </div>
    }
</mat-dialog-content>
