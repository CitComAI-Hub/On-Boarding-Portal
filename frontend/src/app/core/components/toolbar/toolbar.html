<mat-toolbar color="primary" class="main-header mat-elevation-z4">
    <div class="header-container">
        <div class="brand" (click)="goLanding()">
            <img src="/logo-citcom.png" width="170" height="40" alt="CitCom"
                onerror="this.onerror=null;this.src='/favicon.ico';this.width=54;this.height=54;" />
            <div class="brand-text">
                <strong>{{ ui.t('toolbar.portal') }}</strong>
                <span>{{ ui.t('toolbar.space') }}</span>
            </div>
        </div>

        <span class="spacer"></span>
        <div class="toolbar-actions">
            @if(showAdminLogin || showUserMenu) {
            @if(showAdminLogin) {
            <button mat-button class="nav-link" (click)="onAdminLogin()">
                <mat-icon>lock_open</mat-icon>
                {{ ui.t('toolbar.admin') }}
            </button>
            }
            @if(showUserMenu && user) {
            <button matButton="text" [matMenuTriggerFor]="menu">
                <mat-icon>person</mat-icon>
                {{ user.given_name }} {{ user.family_name }}
            </button>
            <mat-menu #menu="matMenu">
                <button mat-menu-item disabled>
                    <p>{{ user.preferred_username }}</p>
                </button>
                <button (click)="onLogout()" mat-menu-item>{{ ui.t('toolbar.logout') }}</button>
            </mat-menu>
            }
            }

            <button mat-button [matMenuTriggerFor]="languageMenu" class="lang-button">
                <mat-icon>language</mat-icon>
                {{ ui.language().toUpperCase() }}
            </button>

            <mat-menu #languageMenu="matMenu">
                <button mat-menu-item (click)="ui.setLanguage('en')">{{ ui.t('toolbar.langEnglish') }}</button>
                <button mat-menu-item (click)="ui.setLanguage('es')">{{ ui.t('toolbar.langSpanish') }}</button>
            </mat-menu>

            <button mat-icon-button type="button" [attr.aria-label]="ui.t('toolbar.theme')" (click)="ui.toggleTheme()">
                <mat-icon>{{ ui.theme() === 'dark' ? 'light_mode' : 'dark_mode' }}</mat-icon>
            </button>
        </div>
    </div>
</mat-toolbar>
