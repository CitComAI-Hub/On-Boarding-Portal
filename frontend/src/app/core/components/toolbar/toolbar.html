<mat-toolbar color="primary" class="main-header mat-elevation-z4">
    <div class="header-container">
        <div class="brand" (click)="goLanding()">
            <img src="/logo-citcom.png" width="170" height="40" alt="CitCom"
                onerror="this.onerror=null;this.src='/favicon.ico';this.width=54;this.height=54;" />
            <div class="brand-text">
                <strong>Portal de Onboarding</strong>
                <span>Espacio de Datos</span>
            </div>
        </div>
        <span class="spacer"></span>
        @if(showAdminLogin || showOnBoarding || showUserMenu) {
        <div>
            @if(showAdminLogin) {

            <button mat-button class="nav-link" (click)="onAdminLogin()">
                <mat-icon>lock_open</mat-icon>
                PORTAL ADMIN
            </button>
            }
            @if(showOnBoarding) {
            <button mat-flat-button color="accent" class="cta-small" (click)="onSubmit()">
                INICIAR ONBOARDING
            </button>
            }
            @if(showUserMenu && user) {
            <button matButton="text" [matMenuTriggerFor]="menu">
                <mat-icon>person</mat-icon>
                {{ user.given_name }} {{ user.family_name }}
            </button>
            <mat-menu #menu="matMenu">
                <button mat-menu-item disabled>
                    <p>{{ user.preferred_username }}</p>
                </button>
                <button (click)="onLogout()" mat-menu-item>Cerrar sesion</button>
            </mat-menu>
            }
        </div>
        }
    </div>
</mat-toolbar>
