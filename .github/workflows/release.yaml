name: Release By Tag

on:
  push:
    tags:
      - "onboarding-citcom-*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  PLATFORMS: linux/amd64,linux/arm64

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag comes from master
        run: |
          git fetch origin master
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/master"; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit in master. Release aborted."
            exit 1
          fi

      - name: Derive release versions
        id: versions
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          APP_VERSION="${TAG_NAME#onboarding-citcom-}"

          if [[ "${APP_VERSION}" =~ ^[0-9]+\.[0-9]+$ ]]; then
            CHART_VERSION="${APP_VERSION}.0"
          else
            CHART_VERSION="${APP_VERSION}"
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR for Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.tag_name }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.versions.outputs.app_version }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Prepare Helm chart release values
        run: |
          sed -i "s/^version: .*/version: ${CHART_VERSION}/" chart/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: ${APP_VERSION}/" chart/Chart.yaml
          sed -i "s|^[[:space:]]*repository: .*|  repository: ${REGISTRY}/${IMAGE_NAME}|" chart/values.yaml
          sed -i "s|^[[:space:]]*tag: .*|  tag: \"${TAG_NAME}\"|" chart/values.yaml
        env:
          TAG_NAME: ${{ steps.versions.outputs.tag_name }}
          APP_VERSION: ${{ steps.versions.outputs.app_version }}
          CHART_VERSION: ${{ steps.versions.outputs.chart_version }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ env.IMAGE_NAME }}

      - name: Lint and package Helm chart
        run: |
          helm lint chart
          mkdir -p dist
          helm package chart --destination dist

      - name: Login to GHCR for Helm OCI
        run: |
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart to GHCR OCI
        run: |
          helm push "dist/onboarding-portal-${CHART_VERSION}.tgz" "oci://ghcr.io/${OWNER}/helm"
        env:
          CHART_VERSION: ${{ steps.versions.outputs.chart_version }}
          OWNER: ${{ github.repository_owner }}
