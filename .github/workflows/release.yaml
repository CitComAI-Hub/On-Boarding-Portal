name: Release By Tag

on:
  push:
    tags:
      - "onboarding-citcom-*"

permissions:
  contents: read
  packages: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  PLATFORMS: linux/amd64,linux/arm64
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag comes from main
        run: |
          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" "origin/main"; then
            echo "Tag ${GITHUB_REF_NAME} does not point to a commit in main. Release aborted."
            exit 1
          fi

      - name: Derive release versions
        id: versions
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          APP_VERSION="${TAG_NAME#onboarding-citcom-}"
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE_NAME="${OWNER_LC}/onboarding-citcom"

          if [[ "${APP_VERSION}" =~ ^[0-9]+\.[0-9]+$ ]]; then
            CHART_VERSION="${APP_VERSION}.0"
          else
            CHART_VERSION="${APP_VERSION}"
          fi

          echo "tag_name=${TAG_NAME}" >> "$GITHUB_OUTPUT"
          echo "app_version=${APP_VERSION}" >> "$GITHUB_OUTPUT"
          echo "chart_version=${CHART_VERSION}" >> "$GITHUB_OUTPUT"
          echo "image_name=${IMAGE_NAME}" >> "$GITHUB_OUTPUT"
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR for Docker
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ env.PLATFORMS }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.versions.outputs.image_name }}:${{ steps.versions.outputs.tag_name }}
            ${{ env.REGISTRY }}/${{ steps.versions.outputs.image_name }}:${{ steps.versions.outputs.app_version }}

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Prepare Helm chart release values
        run: |
          sed -i "s/^version: .*/version: ${CHART_VERSION}/" chart/Chart.yaml
          sed -i "s/^appVersion: .*/appVersion: \"${APP_VERSION}\"/" chart/Chart.yaml
          sed -i "s|^[[:space:]]*repository: .*|  repository: ${REGISTRY}/${IMAGE_NAME}|" chart/values.yaml
          sed -i "s|^[[:space:]]*tag: .*|  tag: \"${TAG_NAME}\"|" chart/values.yaml
        env:
          TAG_NAME: ${{ steps.versions.outputs.tag_name }}
          APP_VERSION: ${{ steps.versions.outputs.app_version }}
          CHART_VERSION: ${{ steps.versions.outputs.chart_version }}
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAME: ${{ steps.versions.outputs.image_name }}

      - name: Lint and package Helm chart
        id: helm_package
        run: |
          helm lint chart
          mkdir -p dist
          PKG_FILE=$(helm package chart --destination dist | awk '{print $NF}')
          echo "package_file=${PKG_FILE}" >> "$GITHUB_OUTPUT"

      - name: Login to GHCR for Helm OCI
        run: |
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart to GHCR OCI
        run: |
          helm push "${PACKAGE_FILE}" "oci://ghcr.io/${OWNER}/helm"
        env:
          PACKAGE_FILE: ${{ steps.helm_package.outputs.package_file }}
          OWNER: ${{ steps.versions.outputs.owner_lc }}
